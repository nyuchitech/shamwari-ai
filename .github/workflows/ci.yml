name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, types, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run check-types

      - run: npm run build

  python:
    name: Python (lint, types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy type check
        run: mypy src/

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    needs: python
    if: hashFiles('tests/**/*.py') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: pytest --tb=short

  db-init:
    name: Verify DB init
    runs-on: ubuntu-latest
    needs: python
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e .

      - name: Test DB initialization with all Beanie models
        run: python -c "
          import asyncio
          from src.db.init import init_db, close_db

          async def main():
              client = await init_db('mongodb://localhost:27017', database_name='shamwari_test')
              db = client['shamwari_test']
              collections = await db.list_collection_names()
              print(f'Initialized {len(collections)} collections: {sorted(collections)}')
              await close_db()
              print('DB init verified successfully')

          asyncio.run(main())
          "
