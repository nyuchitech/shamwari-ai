name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, types, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - run: npm run lint

      - run: npm run check-types

      - run: npm run build

  python:
    name: Python (lint, types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy type check
        run: mypy src/

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    needs: python
    if: hashFiles('tests/**/*.py') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: pytest --tb=short

  db-init:
    name: Verify DB init
    runs-on: ubuntu-latest
    needs: python
    services:
      couchdb:
        image: couchdb:3
        ports:
          - 5984:5984
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e .

      - name: Test CouchDB initialization
        run: python -c "
          import asyncio
          from src.db.init import init_db, close_db

          async def main():
              couch = await init_db('http://localhost:5984', user='admin', password='password')
              print('CouchDB connection verified')
              await close_db()
              print('DB init verified successfully')

          asyncio.run(main())
          "

  openapi-check:
    name: Verify OpenAPI spec
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e .

      - name: Generate OpenAPI spec and verify
        run: python -c "
          import json
          from src.main import app

          spec = app.openapi()
          print(f'Title: {spec[\"info\"][\"title\"]}')
          print(f'Version: {spec[\"info\"][\"version\"]}')
          print(f'Paths: {len(spec.get(\"paths\", {}))}')
          assert len(spec.get('paths', {})) > 0, 'No API paths defined'
          print('OpenAPI spec generation verified')
          "
