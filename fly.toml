# Shamwari AI — Python FastAPI backend on Fly.io
# https://fly.io/docs/reference/configuration/

app = "shamwari-ai"
primary_region = "jnb"  # Johannesburg — closest to Zimbabwe

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
